<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Apex Scheduler — staff scheduling for hospitality teams.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;background:#F9F6F0;">
  <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Noto Sans',sans-serif;color:#3E1F13;">
    Loading Apex Scheduler…
  </div>
  <script>
    function showLoadError(msg) {
      var el = document.getElementById('loading');
      if (el) {
        el.style.color = '#991B1B';
        el.style.padding = '24px';
        el.style.textAlign = 'center';
        el.style.maxWidth = '420px';
        el.style.margin = '0 auto';
        el.style.lineHeight = '1.5';
        el.textContent = msg;
      }
    }
    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    }
    // Flutter removes this overlay when the first frame renders.
    window.addEventListener('flutter-first-frame', hideLoading);
    window.addEventListener('error', function (event) {
      showLoadError('Failed to load app: ' + (event.message || 'unknown error'));
    });
    setTimeout(function () {
      var el = document.getElementById('loading');
      if (el) {
        showLoadError(
          'Still loading after 30s. Try hard refresh. If on a preview URL, use Production: apex-scheduler-theta.vercel.app'
        );
      }
    }, 30000);
  </script>
  <script src="flutter_bootstrap.js" onerror="showLoadError('flutter_bootstrap.js failed to load (404). Redeploy production branch cursor/apex-store-launch-447c.')"></script>
</body>
</html>
